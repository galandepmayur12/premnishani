version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: premnishani
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/premnishani
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/premnishani
      SECRET_KEY: dev-secret-change-in-production
    depends_on:
      - db
volumes:
  pgdata: {}
